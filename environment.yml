name: melt-olala
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    # PyTorch CUDA 12.1 compatible wheels (DWS, bwUniCluster).
    # On macOS arm64 pip ignores the cu121 index and falls back to PyPI (MPS build).
    - --extra-index-url https://download.pytorch.org/whl/cu121
    # --- deep learning core ---
    # <2.11 avoids CUDA 13.0 builds that are incompatible with CUDA 12.1 clusters.
    - "torch>=2.4.0,<2.11"
    - transformers>=4.45.0
    - accelerate>=0.34.0
    - bitsandbytes>=0.43.0
    - safetensors>=0.4.0
    - tokenizers>=0.19.0
    - sentence-transformers>=3.0.0
    - huggingface-hub>=0.24.0
    # --- ontology / graph ---
    - rdflib>=7.0.0
    - networkx>=3.0
    # --- ML utilities ---
    - scikit-learn>=1.3.0
    - scipy>=1.13.0
    - numpy>=1.26.0
    # --- experiment tracking ---
    - wandb>=0.17.0
    # --- API / HTTP ---
    - openai>=1.0.0
    - requests
    - httpx
    # --- general utilities ---
    - python-dotenv>=1.0.0
    - tqdm
    - pyyaml
    - psutil
    - packaging
    - tiktoken
    - filelock
    - jinja2
    # NOTE: flash-attn requires CUDA and cannot be installed on macOS/CPU.
    # Install manually on CUDA clusters after env creation:
    #   pip install flash-attn --no-build-isolation
    #
    # NOTE: vllm requires CUDA and cannot be installed on macOS/CPU.
    # Install manually on CUDA clusters after env creation:
    #   pip install vllm
